<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="Mobility Analytics Streaming Pipeline architecture">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; }
      .stage { fill: #1e293b; stroke: #475569; stroke-width: 2; rx: 16; }
      .title { fill: #e5e7eb; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 16px Arial, sans-serif; }
      .label { fill: #f8fafc; font: 700 18px Arial, sans-serif; }
      .text { fill: #cbd5e1; font: 500 14px Arial, sans-serif; }
      .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .small { fill: #93c5fd; font: 600 13px Arial, sans-serif; }
      .tag { fill: #0b5fff; opacity: .18; stroke: #60a5fa; stroke-width: 1.5; rx: 12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="420" rx="20"/>
  <text class="title" x="40" y="52">Mobility Analytics Streaming Pipeline</text>
  <text class="subtitle" x="40" y="82">Producer → Kafka → Bronze → Silver + Rejects → Gold → Hive / Spark SQL → Power BI</text>

  <rect class="panel" x="30" y="110" width="1340" height="270" rx="22"/>

  <rect class="stage" x="60" y="165" width="170" height="115" rx="16"/>
  <text class="label" x="90" y="202">Python Producer</text>
  <text class="text" x="88" y="228">Simulated traffic events</text>
  <text class="text" x="88" y="250">Controlled dirty-data injection</text>
  <text class="text" x="88" y="272">Runs on host machine</text>

  <rect class="stage" x="275" y="165" width="145" height="115" rx="16"/>
  <text class="label" x="323" y="202">Kafka</text>
  <text class="text" x="302" y="228">Topic: traffic-topic</text>
  <text class="text" x="296" y="250">Partitions: 3</text>

  <rect class="stage" x="470" y="145" width="165" height="90" rx="16"/>
  <text class="label" x="522" y="182">Bronze</text>
  <text class="text" x="498" y="207">Raw Delta ingestion</text>

  <rect class="stage" x="470" y="250" width="165" height="90" rx="16"/>
  <text class="label" x="520" y="287">Silver</text>
  <text class="text" x="487" y="312">DQ, casting, features</text>

  <rect class="stage" x="690" y="145" width="170" height="90" rx="16"/>
  <text class="label" x="747" y="182">Rejects</text>
  <text class="text" x="720" y="207">Quarantine bad records</text>

  <rect class="stage" x="690" y="250" width="170" height="90" rx="16"/>
  <text class="label" x="754" y="287">Gold</text>
  <text class="text" x="708" y="312">dim_zone, dim_road, fact_traffic</text>

  <rect class="stage" x="915" y="165" width="180" height="115" rx="16"/>
  <text class="label" x="950" y="202">Hive / Spark SQL</text>
  <text class="text" x="943" y="228">External Delta tables</text>
  <text class="text" x="948" y="250">BI-facing SQL views</text>
  <text class="text" x="944" y="272">Thrift Server on :10000</text>

  <rect class="stage" x="1145" y="165" width="180" height="115" rx="16"/>
  <text class="label" x="1200" y="202">Power BI</text>
  <text class="text" x="1175" y="228">DirectQuery / Spark connector</text>
  <text class="text" x="1174" y="250">Dashboard-ready metrics</text>

  <path class="arrow" d="M230 222 H275"/>
  <path class="arrow" d="M420 222 H470"/>
  <path class="arrow" d="M552 235 V250"/>
  <path class="arrow" d="M635 190 H690"/>
  <path class="arrow" d="M635 295 H690"/>
  <path class="arrow" d="M860 295 H915"/>
  <path class="arrow" d="M1095 222 H1145"/>

  <rect class="tag" x="484" y="115" width="137" height="24" rx="12"/>
  <text class="small" x="498" y="132">Delta Lake: bronze</text>

  <rect class="tag" x="482" y="354" width="180" height="24" rx="12"/>
  <text class="small" x="497" y="371">Silver cleans + deduplicates</text>

  <rect class="tag" x="705" y="354" width="141" height="24" rx="12"/>
  <text class="small" x="720" y="371">Gold uses MERGE</text>
</svg>
