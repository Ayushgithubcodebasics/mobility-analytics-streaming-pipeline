[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E402"]

[tool.coverage.run]
omit = [
  "apps/traffic_bronze.py",
  "apps/traffic_silver.py",
  "apps/traffic_gold.py",
]
